    <link rel="stylesheet" href="../css/styleResponsive.css" />
    <link rel="stylesheet" href="../css/erro404.css" />
    <title>Circle</title>
  </head>
  <body>
    <header class="header">
      <nav class="header-inner">
        <img
          src="../assets/logos/circle.svg"
          alt="Logo de circle"
          class="logo"
        />
        <input type="checkbox" id="menu-toggle" class="menu-toggle" />
        <label for="menu-toggle" class="hamburger">☰</label>
        <nav class="menu">
          <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="../index.html">Projects</a></li>
            <li><a href="../page/formulario.html">Services</a></li>
          </ul>
        </nav>

        <button class="btn-contact">Contact Us</button>
      </nav>
    </header>
    
    <div id="content">
        <h1>404 - Page Not Found</h1>
        <p>Sorry, the page you are looking for does not exist.</p>
        <a href="../index.html" class="btn">Go Back Home</a>
    </div>

    <!-- Pie de pagina -->
    <footer class="piePage">
      <article class="footer-container">
        <section>
          <img
            src="../assets/logos/circle.svg"
            alt="Logo de circle"
            class="logo-footer">
          <p>2972 Westheimer Rd. Santa Ana, Illinois 85486</p>
          </section>
        <section>
          <ul class="footer-links">
            <li><a href="#">Team</a></li>

          </ul>
        </section>
      </article>
    </footer>
    <script src="../JavaScript/global.js" defer></script>
    <script src="../JavaScript/error404.js" defer></script>
    
    <!-- Service Worker Registration -->
    <script defer>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('../sw.js')
            .then(reg => {
              if (location.hostname === 'localhost') {
                console.log('✓ Service Worker registrado:', reg.scope);
              }
            })
            .catch(err => {
              if (location.hostname === 'localhost') {
                console.error('✗ Error registrando SW:', err);
              }
            });
        });
      }
    </script>
  </body>
</html>
