<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/styleResponsive.css" />
    <link rel="stylesheet" href="../css/formulario.css" />

    <title>Circle</title>
  </head>
  <body>
    <header class="header">
      <nav class="header-inner">
        <img
          src="../assets/logos/circle.svg"
          alt="Logo de circle"
          class="logo"
        />
        <!-- menu_de_navegacion -->
        <input type="checkbox" id="menu-toggle" class="menu-toggle" />
        <label for="menu-toggle" class="hamburger">☰</label>
        <nav class="menu">
           <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="../index.html">Projects</a></li>
            <li><a href="../page/formulario.html">Services</a></li>
          </ul>
        </nav>

        <button class="btn-contact">Contact Us</button>
      </nav>
    </header>

    
    <form >
      <h1 class="title">Contact Us</h1>
      <div class="form-group">
        <label for="name">Full name:</label>
        <input type="text" id="name" name="name"  placeholder="Nombre completo"required>
      </div>
      <div class="form-group_diferent">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Tu correo electrónico" required>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" placeholder="Tu número de teléfono" required>
      </div>

      <div class="form-group">
        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="Tu mensaje" required></textarea>
      </div>
      <button class="container_form_button" type="submit">Submit</button>
    </form>

    <!-- Pie de pagina -->
    <footer class="piePage">
      <article class="footer-container">
        <section>
          <img
            src="../assets/logos/circle.svg"
            alt="Logo de circle"
            class="logo-footer">
          <p>2972 Westheimer Rd. Santa Ana, Illinois 85486</p>
          </section>
        <section>
          <ul class="footer-links">
            <li><a href="#">Team</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Press</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="./error404.html">Privacy Policy</a></li>
          </ul>
        </section>
      </article>
    </footer>
    <script src="../JavaScript/global.js" defer></script>
    <script src="../JavaScript/formulario.js" defer></script>
    
    <!-- Service Worker Registration -->
    <script defer>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('../sw.js')
            .then(reg => {
              if (location.hostname === 'localhost') {
                console.log('✓ Service Worker registrado:', reg.scope);
              }
              
              // Detectar actualizaciones cada 5 segundos
              setInterval(() => {
                reg.update();
              }, 5000);
              
              // Cuando hay una actualización disponible, recargar página
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('✓ Nueva versión disponible - recargando...');
                    window.location.reload();
                  }
                });
              });
            })
            .catch(err => {
              if (location.hostname === 'localhost') {
                console.error('✗ Error registrando SW:', err);
              }
            });
        });
      }
    </script>
  </body>
</html>
